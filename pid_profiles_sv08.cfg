# =============================================================================
# Klipper PID Profiles — Sovol SV08
# =============================================================================
#
# Automatically selects PID values based on target temperature:
#   Hotend  < 250°C → STANDARD profile  (PLA, PETG, TPU)
#   Hotend >= 250°C → HIGH    profile  (ABS, ASA, PC)
#   Bed    <=  85°C → STANDARD profile  (PLA, PETG)
#   Bed    >   85°C → HIGH    profile  (ABS, ASA, PC)
#
# SETUP
#   1. Add to printer.cfg:
#        [include pid_profiles_sv08.cfg]
#
#   2. The M109/M190 macros in Macro.cfg must already contain the _APPLY_PID hook.
#      See README.md for the required changes to Macro.cfg.
#
# CALIBRATION (run once per profile, printer must be idle)
#   Hotend standard:  PID_CALIBRATE HEATER=extruder    TARGET=220
#   Hotend high:      PID_CALIBRATE HEATER=extruder    TARGET=260
#   Bed    standard:  PID_CALIBRATE HEATER=heater_bed  TARGET=65
#   Bed    high:      PID_CALIBRATE HEATER=heater_bed  TARGET=100
#
#   After each run Klipper prints:
#     // PID parameters: pid_Kp=XX.XXX pid_Ki=X.XXX pid_Kd=XXX.XXX
#   Copy those values into the matching variables below.
# =============================================================================

[gcode_macro _pid_profiles]

# --- Hotend ---
# Calibrated at 220°C  (covers PLA 190–210°C, PETG 230–250°C, TPU 220–240°C)
variable_extruder_standard_kp: 33.838
variable_extruder_standard_ki: 5.223
variable_extruder_standard_kd: 47.752

# Calibrated at 260°C  (covers ABS/ASA 250–270°C, PC 270–300°C)
# TODO: replace after running  PID_CALIBRATE HEATER=extruder TARGET=260
variable_extruder_high_kp: 33.838
variable_extruder_high_ki: 5.223
variable_extruder_high_kd: 47.752

# --- Bed ---
# Calibrated at 65°C  (covers PLA 55–65°C, PETG 70–85°C)
variable_bed_standard_kp: 73.571
variable_bed_standard_ki: 1.820
variable_bed_standard_kd: 783.849

# Calibrated at 100°C  (covers ABS/ASA 90–110°C, PC 100–110°C)
# TODO: replace after running  PID_CALIBRATE HEATER=heater_bed TARGET=100
variable_bed_high_kp: 73.571
variable_bed_high_ki: 1.820
variable_bed_high_kd: 783.849

gcode:


# =============================================================================

[gcode_macro _APPLY_PID]
description: Apply the correct PID profile for a given heater and target temperature
gcode:
    {% set heater = params.HEATER %}
    {% set target = params.TARGET|float %}
    {% set p = printer['gcode_macro _pid_profiles'] %}

    {% if heater == 'extruder' %}
        {% if target >= 250 %}
            SET_HEATER_PID HEATER=extruder KP={p.extruder_high_kp} KI={p.extruder_high_ki} KD={p.extruder_high_kd}
            {action_respond_info("PID: extruder HIGH (%.0f C)" % target)}
        {% else %}
            SET_HEATER_PID HEATER=extruder KP={p.extruder_standard_kp} KI={p.extruder_standard_ki} KD={p.extruder_standard_kd}
            {action_respond_info("PID: extruder STANDARD (%.0f C)" % target)}
        {% endif %}
    {% elif heater == 'heater_bed' %}
        {% if target > 85 %}
            SET_HEATER_PID HEATER=heater_bed KP={p.bed_high_kp} KI={p.bed_high_ki} KD={p.bed_high_kd}
            {action_respond_info("PID: bed HIGH (%.0f C)" % target)}
        {% else %}
            SET_HEATER_PID HEATER=heater_bed KP={p.bed_standard_kp} KI={p.bed_standard_ki} KD={p.bed_standard_kd}
            {action_respond_info("PID: bed STANDARD (%.0f C)" % target)}
        {% endif %}
    {% endif %}
