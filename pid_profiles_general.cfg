# =============================================================================
# Klipper PID Profiles — Generic
# =============================================================================
#
# Automatically selects PID values based on target temperature:
#   Hotend  < 250°C → STANDARD profile  (PLA, PETG, TPU)
#   Hotend >= 250°C → HIGH    profile  (ABS, ASA, PC)
#   Bed    <=  85°C → STANDARD profile  (PLA, PETG)
#   Bed    >   85°C → HIGH    profile  (ABS, ASA, PC)
#
# SETUP — two options:
#
#   Option A  (self-contained, no existing M109/M190 overrides)
#     1. Add to printer.cfg:
#          [include pid_profiles_general.cfg]
#     2. Fill in your PID values below (see CALIBRATION section).
#     Done. The included M109/M190 overrides at the bottom of this file
#     will handle profile switching automatically.
#
#   Option B  (you already override M109/M190 in your own macros)
#     1. Add to printer.cfg:
#          [include pid_profiles_general.cfg]
#     2. Delete or comment out the M109 and M190 sections at the
#        bottom of this file to avoid conflicts.
#     3. In your existing M109 macro add before the M104 line:
#          {% if s != 0 %}
#              _APPLY_PID HEATER=extruder TARGET={s}
#          {% endif %}
#     4. In your existing M190 macro add before the M140 line:
#          {% if s != 0 %}
#              _APPLY_PID HEATER=heater_bed TARGET={s}
#          {% endif %}
#     5. Fill in your PID values below.
#
# CALIBRATION (run once per profile, printer must be idle)
#   Hotend standard:  PID_CALIBRATE HEATER=extruder    TARGET=220
#   Hotend high:      PID_CALIBRATE HEATER=extruder    TARGET=260
#   Bed    standard:  PID_CALIBRATE HEATER=heater_bed  TARGET=65
#   Bed    high:      PID_CALIBRATE HEATER=heater_bed  TARGET=100
#
#   After each run Klipper prints:
#     // PID parameters: pid_Kp=XX.XXX pid_Ki=X.XXX pid_Kd=XXX.XXX
#   Copy those values into the matching variables below.
#   You do NOT need to SAVE_CONFIG — values live here, not in printer.cfg.
#
# NOTE: If you have never run PID_CALIBRATE, use your existing printer.cfg
#   pid_kp/pid_ki/pid_kd values as a starting point for the standard profile.
#   The high profile can use the same values initially and be updated later.
# =============================================================================

[gcode_macro _pid_profiles]

# --- Hotend ---
# Calibrated at ~220°C  (covers PLA 190–210°C, PETG 230–250°C, TPU 220–240°C)
# REPLACE with output of:  PID_CALIBRATE HEATER=extruder TARGET=220
variable_extruder_standard_kp: 26.213
variable_extruder_standard_ki: 1.304
variable_extruder_standard_kd: 131.721

# Calibrated at ~260°C  (covers ABS/ASA 250–270°C, PC 270–300°C)
# REPLACE with output of:  PID_CALIBRATE HEATER=extruder TARGET=260
variable_extruder_high_kp: 26.213
variable_extruder_high_ki: 1.304
variable_extruder_high_kd: 131.721

# --- Bed ---
# Calibrated at ~65°C  (covers PLA 55–65°C, PETG 70–85°C)
# REPLACE with output of:  PID_CALIBRATE HEATER=heater_bed TARGET=65
variable_bed_standard_kp: 71.453
variable_bed_standard_ki: 1.498
variable_bed_standard_kd: 851.962

# Calibrated at ~100°C  (covers ABS/ASA 90–110°C, PC 100–110°C)
# REPLACE with output of:  PID_CALIBRATE HEATER=heater_bed TARGET=100
variable_bed_high_kp: 71.453
variable_bed_high_ki: 1.498
variable_bed_high_kd: 851.962

gcode:


# =============================================================================

[gcode_macro _APPLY_PID]
description: Apply the correct PID profile for a given heater and target temperature
gcode:
    {% set heater = params.HEATER %}
    {% set target = params.TARGET|float %}
    {% set p = printer['gcode_macro _pid_profiles'] %}

    {% if heater == 'extruder' %}
        {% if target >= 250 %}
            SET_HEATER_PID HEATER=extruder KP={p.extruder_high_kp} KI={p.extruder_high_ki} KD={p.extruder_high_kd}
            {action_respond_info("PID: extruder HIGH (%.0f C)" % target)}
        {% else %}
            SET_HEATER_PID HEATER=extruder KP={p.extruder_standard_kp} KI={p.extruder_standard_ki} KD={p.extruder_standard_kd}
            {action_respond_info("PID: extruder STANDARD (%.0f C)" % target)}
        {% endif %}
    {% elif heater == 'heater_bed' %}
        {% if target > 85 %}
            SET_HEATER_PID HEATER=heater_bed KP={p.bed_high_kp} KI={p.bed_high_ki} KD={p.bed_high_kd}
            {action_respond_info("PID: bed HIGH (%.0f C)" % target)}
        {% else %}
            SET_HEATER_PID HEATER=heater_bed KP={p.bed_standard_kp} KI={p.bed_standard_ki} KD={p.bed_standard_kd}
            {action_respond_info("PID: bed STANDARD (%.0f C)" % target)}
        {% endif %}
    {% endif %}


# =============================================================================
# M109 / M190 overrides — Option A only
# If you already override M109/M190 in your own macros, delete this section
# and follow Option B in the setup instructions above.
# =============================================================================

[gcode_macro M109]
rename_existing: M99109
gcode:
    {% set s = params.S|float %}
    {% if s != 0 %}
        _APPLY_PID HEATER=extruder TARGET={s}
    {% endif %}
    M104 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s-1} MAXIMUM={s+1}
    {% endif %}

[gcode_macro M190]
rename_existing: M99190
gcode:
    {% set s = params.S|float %}
    {% if s != 0 %}
        _APPLY_PID HEATER=heater_bed TARGET={s}
    {% endif %}
    M140 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={s-1} MAXIMUM={s+1}
    {% endif %}
